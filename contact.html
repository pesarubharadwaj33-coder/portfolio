<!DOCTYPE html>
<html>
<head>
<title>Contact | P Bharadwaj</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.navbar{
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
}

.section-title{
    text-align:center;
    margin-top:100px;
    margin-bottom:40px;
    font-size:2.5rem;
    font-weight:bold;
    letter-spacing:2px;
}

.contact-card{
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:40px;
    box-shadow:0 8px 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

.form-control{
    background: rgba(255,255,255,0.1);
    border:none;
    color:white;
}

.form-control:focus{
    background: rgba(255,255,255,0.15);
    box-shadow:none;
    border:1px solid #0dcaf0;
    color:white;
}

.btn-custom{
    background:#0dcaf0;
    border:none;
    padding:10px 25px;
    font-weight:bold;
    transition:0.3s;
}

.btn-custom:hover{
    background:#0bb5d6;
    transform:translateY(-3px);
}

.social-icons a{
    color:white;
    font-size:20px;
    margin:0 10px;
    transition:0.3s;
}

.social-icons a:hover{
    color:#0dcaf0;
    transform:scale(1.2);
}

footer{
    text-align:center;
    padding:20px;
    margin-top:60px;
    background: rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">P Bharadwaj</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse justify-content-end" id="nav">
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
<li class="nav-item"><a class="nav-link" href="hobbies.html">Hobbies</a></li>
<li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
<li class="nav-item"><a class="nav-link" href="certificates.html">Certificates</a></li>
<li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
</ul>
</div>
</div>
</nav>

<div class="container">
<h2 class="section-title">Contact Me</h2>

<div class="row justify-content-center">
<div class="col-md-8 col-lg-6">
<div class="contact-card">

<form>
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
</div>

<div class="text-center">
<button class="btn btn-custom">Send Message</button>
</div>
</form>

<hr class="my-4" style="opacity:0.3;">

<div class="text-center social-icons">
<a href="#"><i class="fab fa-linkedin"></i></a>
<a href="#"><i class="fab fa-github"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fas fa-envelope"></i></a>
</div>

</div>
</div>
</div>
</div>

<footer>

</footer>

</body>
</html>
